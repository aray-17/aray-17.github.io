<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Not found — Aninda Ray</title>
  <meta name="robots" content="noindex">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --bg: #fdfcfa;
      --text: #1c1c1a;
      --text-muted: #6b6a64;
      --text-faint: #5d5b54;
      --rule: rgba(28, 28, 26, 0.10);
      --accent: #1f4ec5;
      --focus: #ff6b00;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --serif: "Iowan Old Style", "Charter", Georgia, Cambria, serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14140f; --text: #ebe9e2; --text-muted: #908d83;
        --text-faint: #c0bdb1; --rule: rgba(235, 233, 226, 0.12);
        --accent: #7da9ff; --focus: #ffb44f;
      }
    }
    @media (prefers-contrast: more) {
      :root { --text-faint: #4a4942; --text-muted: #2d2c28; }
    }
    @media (prefers-contrast: more) and (prefers-color-scheme: dark) {
      :root { --text-faint: #d4d0c5; --text-muted: #ebe7dc; }
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font: 400 14px/1.5 var(--sans);
      display: grid;
      place-items: center;
      padding: 2rem 1.5rem;
    }
    main {
      max-width: 36ch;
      text-align: center;
    }
    h1 {
      font-family: var(--serif);
      font-size: 56px;
      font-weight: 400;
      line-height: 1;
      margin: 0 0 1rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    p { margin: 0 0 1rem; color: var(--text-muted); }
    p:last-child { margin: 1.5rem 0 0; }
    a {
      color: var(--text-faint);
      text-decoration: none;
      font-size: 13px;
    }
    a:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    :focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 1px; }
    @media (forced-colors: active) {
      body { background: Canvas; color: CanvasText; }
      a { color: LinkText; }
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>That page does not exist on this site.</p>
    <p><a href="/">← Aninda Ray</a></p>
  </main>
</body>
</html>
